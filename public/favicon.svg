<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Emerald background -->
  <rect width="32" height="32" rx="7" fill="#059669"/>

  <g fill="none" stroke="white" stroke-linecap="round" stroke-linejoin="round">
    <!-- Head -->
    <circle cx="20" cy="6.5" r="2.6" fill="white" stroke="none"/>

    <!-- Torso: strong forward lean -->
    <line x1="18.5" y1="9.5" x2="14.5" y2="17" stroke-width="2.4"/>

    <!-- Front arm: swings forward and up -->
    <polyline points="17,12.5 12.5,9.5 11,11.5" stroke-width="2"/>

    <!-- Back arm: swings back and down -->
    <line x1="17" y1="12.5" x2="21.5" y2="15.5" stroke-width="2"/>

    <!-- Front leg: knee drives up and forward -->
    <polyline points="14.5,17 10,21.5 12,27" stroke-width="2.2"/>

    <!-- Back leg: extended behind, toe-off -->
    <polyline points="14.5,17 19.5,21 23,25.5" stroke-width="2.2"/>
  </g>
</svg>
