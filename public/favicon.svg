<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <!-- Subtle radial glow behind runner -->
    <radialGradient id="bg" cx="60%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#047857"/>
    </radialGradient>
  </defs>

  <!-- Background with gradient -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- Speed lines trailing left — three lengths, fading opacity -->
  <g stroke="white" stroke-linecap="round">
    <line x1="3"  y1="12" x2="10" y2="12" stroke-width="1.6" opacity="0.5"/>
    <line x1="2"  y1="16" x2="11" y2="16" stroke-width="1.6" opacity="0.35"/>
    <line x1="4"  y1="20" x2="10" y2="20" stroke-width="1.6" opacity="0.2"/>
  </g>

  <!-- Runner: shifted right, strong forward lean -->
  <g fill="none" stroke="white" stroke-linecap="round" stroke-linejoin="round">
    <!-- Head -->
    <circle cx="22" cy="6.5" r="2.6" fill="white" stroke="none"/>

    <!-- Torso -->
    <line x1="20.5" y1="9.5" x2="16.5" y2="17" stroke-width="2.4"/>

    <!-- Front arm: drives forward and up -->
    <polyline points="19,12.5 14.5,9.5 13,11.5" stroke-width="2"/>

    <!-- Back arm: trails behind -->
    <line x1="19" y1="12.5" x2="23.5" y2="15.5" stroke-width="2"/>

    <!-- Front leg: knee high -->
    <polyline points="16.5,17 12,21.5 14,27" stroke-width="2.2"/>

    <!-- Back leg: toe-off, extended behind -->
    <polyline points="16.5,17 21.5,21.5 25,25.5" stroke-width="2.2"/>
  </g>
</svg>
