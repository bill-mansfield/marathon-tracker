<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="8" fill="#059669"/>
  <!-- Running figure: head -->
  <circle cx="20" cy="8" r="2.5" fill="white"/>
  <!-- Body / forward lean -->
  <line x1="20" y1="10.5" x2="17" y2="16" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <!-- Back arm -->
  <line x1="18.5" y1="13" x2="22" y2="15" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Front arm -->
  <line x1="18.5" y1="13" x2="15" y2="11.5" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Back leg -->
  <line x1="17" y1="16" x2="20.5" y2="20" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="20.5" y1="20" x2="22" y2="24" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Front leg -->
  <line x1="17" y1="16" x2="13.5" y2="20" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="13.5" y1="20" x2="12" y2="24" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Ground line -->
  <line x1="8" y1="26" x2="24" y2="26" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
</svg>
