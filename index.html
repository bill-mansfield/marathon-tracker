<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RunPlan — Free Running Training Plan Generator</title>
    <meta name="description" content="Generate a personalised training plan for your next 5K, marathon, or ultra. Free, no-nonsense, and syncs with Strava." />

    <!-- Open Graph -->
    <meta property="og:title" content="RunPlan" />
    <meta property="og:description" content="Free running training plan generator. 5K to 100K, syncs with Strava." />
    <meta property="og:image" content="https://runplan.app/og-image.png" />
    <meta property="og:url" content="https://runplan.app" />
    <meta property="og:type" content="website" />

    <!-- Twitter card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="RunPlan" />
    <meta name="twitter:description" content="Free running training plan generator. 5K to 100K, syncs with Strava." />
    <meta name="twitter:image" content="https://runplan.app/og-image.png" />
    <script>
      try {
        var m = localStorage.getItem("marathon-color-mode");
        if (m === "dark") {
          document.documentElement.dataset.theme = "dark";
          document.documentElement.classList.add("dark");
        }
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
